name: CubacellConnect
options:
  bundleIdPrefix: com.cubacellconnect
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  CubacellConnect:
    type: application
    platform: iOS
    sources:
      - CubacellConnect
    info:
      path: CubacellConnect/Info.plist
      properties:
        CFBundleDisplayName: Cubacell Connect
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationQueriesSchemes:
          - tel
          - telprompt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cubacellconnect.app
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
