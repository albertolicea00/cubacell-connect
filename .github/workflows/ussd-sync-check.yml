name: USSD sync check

# Weekly guard: keeps this repo's USSD codes in sync with the single source of
# truth, MyUSSDCodes-collection. On drift the run fails and (on scheduled runs)
# opens/updates a tracking issue.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "CubacellConnect/Resources/ussd_codes.json"
      - ".github/scripts/check-ussd-sync.mjs"
      - ".github/workflows/ussd-sync-check.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: ussd-sync-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      REPORT_FILE: ${{ runner.temp }}/ussd-sync-report.md
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compare codes against MyUSSDCodes-collection
        id: check
        continue-on-error: true
        run: node .github/scripts/check-ussd-sync.mjs

      - name: Open or update drift issue
        if: steps.check.outcome == 'failure' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REPORT_FILE, 'utf8');
            const title = 'USSD codes drifted from MyUSSDCodes-collection';
            const marker = '<!-- ussd-sync-check -->';
            const { owner, repo } = context.repo;
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'ussd-sync', per_page: 100,
            });
            const found = open.find((i) => i.title === title);
            const fullBody = `${marker}\n\n${body}`;
            if (found) {
              await github.rest.issues.update({ owner, repo, issue_number: found.number, body: fullBody });
            } else {
              await github.rest.issues.create({ owner, repo, title, body: fullBody, labels: ['ussd-sync'] });
            }

      - name: Fail if drift detected
        if: steps.check.outcome == 'failure'
        run: |
          echo "USSD codes are out of sync with MyUSSDCodes-collection."
          exit 1
